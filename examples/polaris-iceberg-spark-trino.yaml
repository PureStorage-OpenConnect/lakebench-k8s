# Recipe: polaris-iceberg-spark-trino
#
# Apache Polaris REST catalog + Iceberg + Spark pipeline + Trino query engine.
# Polaris replaces Hive Metastore with a modern REST catalog (port 8181).
#
# Deploys: namespace, S3 secrets, PostgreSQL, Polaris server + bootstrap job,
#          Spark RBAC, Trino (coordinator + workers).
#
# Requirements:
#   - Polaris minimum version: 1.3.0-incubating (earlier versions have STS bug)
#   - FlashBlade / non-AWS S3: set SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION=true
#     (handled automatically by the deployer)
#   - Trino 479+ needed for iceberg.rest-catalog.oauth2.scope support

name: polaris-iceberg-trino
recipe: polaris-iceberg-spark-trino

images:
  spark: apache/spark:4.0.2-python3
  postgres: postgres:17
  polaris: apache/polaris:1.3.0-incubating
  polaris_admin_tool: apache/polaris-admin-tool:1.3.0-incubating
  trino: trinodb/trino:479
  pull_policy: Always

platform:
  kubernetes:
    namespace: polaris-iceberg-trino
    create_namespace: true

  storage:
    s3:
      endpoint: <YOUR_S3_ENDPOINT>          # e.g. http://10.0.0.1:80
      region: us-east-1
      path_style: true                       # required for FlashBlade / MinIO
      access_key: <YOUR_S3_ACCESS_KEY>
      secret_key: <YOUR_S3_SECRET_KEY>
      buckets:
        bronze: polaris-iceberg-trino-bronze
        silver: polaris-iceberg-trino-silver
        gold: polaris-iceberg-trino-gold

    scratch:
      enabled: true
      storage_class: <YOUR_SCRATCH_STORAGE_CLASS>  # Portworx: px-csi-scratch (repl=1)
      create_storage_class: false

  compute:
    postgres:
      storage: 10Gi
      storage_class: <YOUR_DB_STORAGE_CLASS>       # Portworx: px-csi-db (repl=3)

architecture:
  catalog:
    type: polaris

  pipeline:
    mode: batch

  workload:
    schema: customer360
    datagen:
      scale: 1                  # ~10 GB bronze data
      file_size: 64mb
      timestamp_start: "2024-01-01"
      timestamp_end: "2025-01-01"

  query_engine:
    type: trino
    trino:
      coordinator:
        cpu: "2"
        memory: 8Gi
      worker:
        replicas: 2
        cpu: "4"
        memory: 16Gi
        spill_enabled: true
        spill_max_per_node: 40Gi
        storage: 50Gi
        storage_class: ""
