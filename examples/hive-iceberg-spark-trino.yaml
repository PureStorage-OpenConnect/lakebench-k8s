# Recipe: hive-iceberg-spark-trino
#
# Hive Metastore + Iceberg + Spark pipeline + Trino query engine.
# This is the default and most tested combination.
#
# Deploys: namespace, S3 secrets, PostgreSQL, Hive Metastore (Stackable),
#          Spark RBAC, Trino (coordinator + workers).
#
# Trino handles the 8-query benchmark after the pipeline completes.

name: hive-iceberg-trino
recipe: hive-iceberg-spark-trino

images:
  spark: apache/spark:4.0.2-python3
  postgres: postgres:17
  trino: trinodb/trino:479
  pull_policy: Always

platform:
  kubernetes:
    namespace: hive-iceberg-trino
    create_namespace: true

  storage:
    s3:
      endpoint: <YOUR_S3_ENDPOINT>          # e.g. http://10.0.0.1:80
      region: us-east-1
      path_style: true                       # required for FlashBlade / MinIO
      access_key: <YOUR_S3_ACCESS_KEY>
      secret_key: <YOUR_S3_SECRET_KEY>
      buckets:
        bronze: hive-iceberg-trino-bronze
        silver: hive-iceberg-trino-silver
        gold: hive-iceberg-trino-gold

    scratch:
      enabled: true
      storage_class: <YOUR_SCRATCH_STORAGE_CLASS>  # Portworx: px-csi-scratch (repl=1)
      create_storage_class: false

  compute:
    postgres:
      storage: 10Gi
      storage_class: <YOUR_DB_STORAGE_CLASS>       # Portworx: px-csi-db (repl=3)

architecture:
  pipeline:
    mode: batch

  workload:
    schema: customer360
    datagen:
      scale: 1                  # ~10 GB bronze data
      file_size: 64mb
      timestamp_start: "2024-01-01"
      timestamp_end: "2025-01-01"

  query_engine:
    type: trino
    trino:
      coordinator:
        cpu: "2"
        memory: 8Gi
      worker:
        replicas: 2             # scale up for larger datasets
        cpu: "4"
        memory: 16Gi
        spill_enabled: true     # prevents OOM on large joins
        spill_max_per_node: 40Gi
        storage: 50Gi
        storage_class: ""       # uses cluster default
