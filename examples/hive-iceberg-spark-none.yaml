# Recipe: hive-iceberg-spark-none
#
# Hive Metastore + Iceberg + Spark pipeline, no query engine.
# Runs the medallion pipeline (bronze -> silver -> gold) without a benchmark.
# Use this when you only care about pipeline throughput, not query performance.
#
# Deploys: namespace, S3 secrets, PostgreSQL, Hive Metastore (Stackable),
#          Spark RBAC.

name: hive-iceberg-pipeline
recipe: hive-iceberg-spark-none

images:
  spark: apache/spark:4.0.2-python3
  postgres: postgres:17
  pull_policy: Always

platform:
  kubernetes:
    namespace: hive-iceberg-pipeline
    create_namespace: true

  storage:
    s3:
      endpoint: <YOUR_S3_ENDPOINT>          # e.g. http://10.0.0.1:80
      region: us-east-1
      path_style: true                       # required for FlashBlade / MinIO
      access_key: <YOUR_S3_ACCESS_KEY>
      secret_key: <YOUR_S3_SECRET_KEY>
      buckets:
        bronze: hive-iceberg-pipeline-bronze
        silver: hive-iceberg-pipeline-silver
        gold: hive-iceberg-pipeline-gold

    scratch:
      enabled: true
      storage_class: <YOUR_SCRATCH_STORAGE_CLASS>  # Portworx: px-csi-scratch (repl=1)
      create_storage_class: false

  compute:
    postgres:
      storage: 10Gi
      storage_class: <YOUR_DB_STORAGE_CLASS>       # Portworx: px-csi-db (repl=3)

architecture:
  pipeline:
    mode: batch

  workload:
    schema: customer360
    datagen:
      scale: 1                  # ~10 GB bronze data
      file_size: 64mb
      timestamp_start: "2024-01-01"
      timestamp_end: "2025-01-01"

  query_engine:
    type: none
